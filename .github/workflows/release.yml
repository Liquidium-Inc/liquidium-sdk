name: Release

on:
  push:
    tags:
      - "@liquidium/client@*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract package changelog entry
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME##*@}"
          release_notes_path="$RUNNER_TEMP/release-notes.md"

          awk -v version="$version" '
            $0 == "## " version { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' packages/client/CHANGELOG.md > "$release_notes_path"

          if [ ! -s "$release_notes_path" ]; then
            echo "No changelog entry found for $version in packages/client/CHANGELOG.md" >&2
            exit 1
          fi

          echo "RELEASE_NOTES_PATH=$release_notes_path" >> "$GITHUB_ENV"

      - name: Create GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --verify-tag --notes-file "$RELEASE_NOTES_PATH" --latest
